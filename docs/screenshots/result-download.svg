<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#09090b"/>
  <!-- Header -->
  <rect y="0" width="800" height="56" fill="#09090b" stroke="#27272a" stroke-width="1"/>
  <text x="100" y="32" fill="#f4f4f5" font-family="system-ui" font-size="16" font-weight="bold">WP Theme Generator</text>
  <text x="100" y="48" fill="#71717a" font-family="system-ui" font-size="10">AI-powered WordPress Block Theme builder</text>
  <text x="700" y="36" fill="#52525b" font-family="monospace" font-size="11">FSE / Block Themes</text>
  <!-- Success banner -->
  <rect x="100" y="80" width="575" height="52" rx="8" fill="#05251a" stroke="#065f46" stroke-opacity="0.3"/>
  <text x="135" y="102" fill="#6ee7b7" font-family="system-ui" font-size="18">&#10003;</text>
  <text x="160" y="102" fill="#6ee7b7" font-family="system-ui" font-size="14" font-weight="500">Theme generated successfully!</text>
  <text x="160" y="120" fill="#6ee7b7" fill-opacity="0.7" font-family="system-ui" font-size="11">4.2 KB · Ready for WordPress 6.4+</text>
  <!-- Theme info -->
  <text x="100" y="165" fill="#f4f4f5" font-family="system-ui" font-size="18" font-weight="bold">Obsidian Lens</text>
  <text x="100" y="188" fill="#a1a1aa" font-family="system-ui" font-size="12">A dramatic dark-mode photography portfolio with a fullscreen hero...</text>
  <!-- File tree -->
  <rect x="100" y="210" width="575" height="260" rx="8" fill="#0a0a0b" stroke="#27272a" stroke-opacity="0.5"/>
  <text x="120" y="238" fill="#d4d4d8" font-family="system-ui" font-size="12" font-weight="500">Generated Files</text>
  <text x="120" y="265" fill="#d4d4d8" font-family="monospace" font-size="12">&#9660; obsidian-lens</text>
  <text x="145" y="285" fill="#71717a" font-family="monospace" font-size="12">- style.css</text>
  <text x="145" y="305" fill="#71717a" font-family="monospace" font-size="12">- functions.php</text>
  <text x="145" y="325" fill="#71717a" font-family="monospace" font-size="12">- theme.json</text>
  <text x="145" y="345" fill="#d4d4d8" font-family="monospace" font-size="12">&#9660; templates/</text>
  <text x="175" y="365" fill="#71717a" font-family="monospace" font-size="12">- index.html</text>
  <text x="175" y="385" fill="#71717a" font-family="monospace" font-size="12">- single.html</text>
  <text x="175" y="405" fill="#71717a" font-family="monospace" font-size="12">- page.html</text>
  <text x="175" y="425" fill="#71717a" font-family="monospace" font-size="12">- archive.html · 404.html · search.html</text>
  <text x="145" y="445" fill="#d4d4d8" font-family="monospace" font-size="12">&#9660; parts/ · &#9660; patterns/</text>
  <!-- Buttons -->
  <rect x="100" y="490" width="400" height="44" rx="8" fill="#7c3aed"/>
  <text x="240" y="517" fill="white" font-family="system-ui" font-size="14" font-weight="600">Download Theme (.zip)</text>
  <rect x="515" y="490" width="160" height="44" rx="8" fill="none" stroke="#3f3f46"/>
  <text x="548" y="517" fill="#d4d4d8" font-family="system-ui" font-size="14">Generate Another</text>
  <!-- Footer -->
  <text x="280" y="575" fill="#52525b" font-family="system-ui" font-size="10">Generates WordPress 6.4+ compatible Block Themes using only native blocks.</text>
</svg>
